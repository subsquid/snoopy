<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=0"/>
    <title>SQD ZK Monitor</title>
    <link rel="icon" type="image/png" href="/favicon.v3.png"/>
    <meta property="og:title" content="SQD ZK Monitor"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.4/dist/web3.min.js"></script>
</head>
<body>
    <div id="root">
        <header class="header">
            <div class="container">
                <div class="header-content">
                    <h1 class="logo">SQD ZK Monitor</h1>
                    <div class="header-stats">
                        <div class="stat">
                            <button class="wallet-connect-btn header-wallet-btn" id="wallet-connect-btn" onclick="connectWallet()">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="currentColor" stroke-width="2"/>
                                    <path d="M15 12L12 15L9 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M12 9V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                                Connect Wallet
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <!-- Discovery Loop Progress Bar -->
                <div id="discovery-progress-bar" class="discovery-progress-bar" aria-label="Discovery loop progress">
                    <!-- Segments are rendered by JS -->
                </div>

                <!-- Tab Navigation -->
                <div class="tab-navigation">
                    <button class="tab-button active" data-tab="proof-storage" onclick="switchTab('proof-storage')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Proof Storage
                    </button>
                    <button class="tab-button" data-tab="fraud-events" onclick="switchTab('fraud-events')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2"/>
                            <path d="M8 12L11 15L16 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Fraud Events
                    </button>
                    <button class="tab-button" data-tab="discovery" onclick="switchTab('discovery')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                            <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Discovery
                    </button>
                    <button class="tab-button" data-tab="my-transactions" onclick="switchTab('my-transactions')" id="transactions-tab-btn" style="display: none;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2"/>
                            <path d="M8 12L11 15L16 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        My Transactions
                    </button>
                </div>

                <!-- Tab Content -->
                <div class="tab-content">
                    <!-- Proof Storage Tab -->
                    <div id="proof-storage-tab" class="tab-pane active">
                        <div class="tasks-section">
                            <div class="section-header">
                                <h2>Proof Storage</h2>
                            </div>

                            <div id="proofs-container" class="tasks-container">
                                <div class="loading-state">
                                    <div class="subsquid-loader"></div>
                                    <p>Loading proofs...</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Fraud Events Tab -->
                    <div id="fraud-events-tab" class="tab-pane">
                        <!-- Fraud Data Section -->
                        <div class="fraud-data-section">
                            <div class="section-header">
                                <h2>Fraud Events</h2>
                                <div class="header-buttons">
                                    <button class="eth-events-btn" onclick="openEthEventsModal()">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                        FraudFound Events
                                    </button>
                                    <button class="refresh-btn" onclick="loadFraudData()">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M1 4V10H7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                            <path d="M3.51 15A9 9 0 1 0 6 5L1 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                        Refresh
                                    </button>
                                </div>
                            </div>
                            
                            <div id="fraud-data-container" class="fraud-data-container">
                                <div class="loading-state">
                                    <div class="subsquid-loader"></div>
                                    <p>Loading fraud data...</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Discovery Tab -->
                    <div id="discovery-tab" class="tab-pane">
                        <div class="discovery-section">
                            <div class="section-header">
                                <h2>Discovery Loop</h2>
                                <div class="discovery-meta" id="discovery-meta"></div>
                            </div>
                            <div class="discovery-toolbar">
                                <label class="freeze-toggle" title="When checked the tree is not replaced when a new iteration starts">
                                    <input type="checkbox" id="discovery-freeze-log">
                                    Freeze log
                                </label>
                            </div>
                            <div id="discovery-tree-container" class="discovery-tree-container">
                                <div class="loading-state">
                                    <div class="subsquid-loader"></div>
                                    <p>Waiting for discovery data…</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- My Transactions Tab -->
                    <div id="my-transactions-tab" class="tab-pane">
                        <div class="transactions-section" id="transactions-section">
                            <div class="section-header">
                                <h2>My Transactions</h2>
                                <div class="header-buttons">
                                    <button class="refresh-btn" onclick="refreshTransactions()">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M1 4V10H7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                            <path d="M3.51 15A9 9 0 1 0 6 5L1 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                        Refresh
                                    </button>
                                </div>
                            </div>
                            
                            <div id="transactions-container" class="transactions-container">
                                <div class="empty-state">
                                    <h3>No transactions yet</h3>
                                    <p>Your transaction history will appear here</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Ethereum Events Modal -->
    <div id="eth-events-modal" class="modal-overlay">
        <div class="modal-content eth-events-modal">
            <div class="modal-header">
                <h3>FraudFound Events</h3>
                <button class="modal-close-btn" onclick="closeEthEventsModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="events-controls">
                    <div class="form-group">
                        <label for="block-range">Block Range</label>
                        <div class="block-range-inputs">
                            <input type="number" id="from-block" placeholder="From Block" min="0" value="0">
                            <span>to</span>
                            <input type="text" id="to-block" placeholder="To Block (e.g., 2000000 or 'latest')" value="latest">
                        </div>
                    </div>
                    <button class="load-events-btn" onclick="loadEthEvents()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 4V10H7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M3.51 15A9 9 0 1 0 6 5L1 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Load FraudFound Events
                    </button>
                </div>
                <div id="events-container" class="events-container">
                    <div class="loading-state">
                        <div class="subsquid-loader"></div>
                        <p>Click "Load FraudFound Events" to fetch fraud events</p>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <div id="toast" class="toast"></div>

    <script>
        // Check if ethers.js loaded properly
        window.addEventListener('load', function() {
            setTimeout(function() {
                if (typeof Web3 === 'undefined') {
                    console.error('Web3.js failed to load!');
                    
                    const connectBtn = document.getElementById('wallet-connect-btn');
                    if (connectBtn) {
                        connectBtn.onclick = function() {
                            alert('Web3 library failed to load. Please refresh the page.');
                        };
                    }
                } else {
                    console.log('Web3.js loaded successfully');
                }
            }, 1000);
        });
    </script>
    <script src="/app.js"></script>
</body>
</html>
